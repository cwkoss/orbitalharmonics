<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      height: 100vh;
      font-family: monospace;
      overflow: hidden;
    }
    #panel {
      width: 200px;
      min-height: 100vh;
      background: #080808;
      border-right: 1px solid #1a1a1a;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    canvas { display: block; }

    /* Panel UI element base styles — applied via p5 .addClass() */
    .panel-btn {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .panel-mode-btn {
      background: #111;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 5px 10px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: block;
      margin-bottom: 3px;
    }
    .panel-input {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
    }
    .panel-select {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="panel"></div>
  <div id="canvas-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="config.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
